name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx expo export --platform web

      # Copy PWA assets
      - name: Copy PWA manifest and icons
        run: |
          cp public/manifest.json dist/manifest.json
          mkdir -p dist/assets
          cp assets/icon-192.png dist/assets/icon-192.png
          cp assets/icon-512.png dist/assets/icon-512.png

      # SEO meta tags + OGP + structured data
      - name: Inject SEO meta tags and structured data
        run: |
          python3 << 'PYEOF'
          with open("dist/index.html", "r") as f:
              html = f.read()
          seo_tags = """<link rel="manifest" href="/web/manifest.json" />
          <meta name="theme-color" content="#0B2545" />
          <meta name="description" content="理学療法士のための自主トレ指導書作成アプリ。運動を選んで回数・セットを設定、イラスト付きA4指導書をPDF出力。完全無料・アカウント不要・オフライン対応。" />
          <meta name="keywords" content="自主トレ,指導書,理学療法,リハビリ,PDF,運動指導,ホームエクササイズ,HEP,トレさく,自主トレ指導書作成,リハビリ運動イラスト,患者教育ツール" />
          <link rel="canonical" href="https://toresaku-app.github.io/web/" />
          <meta property="og:title" content="トレさく | 自主トレ指導書をサクッと作成" />
          <meta property="og:description" content="理学療法士のための自主トレ指導書作成アプリ。運動を選んで回数・セットを設定、イラスト付きA4指導書をPDF出力。完全無料。" />
          <meta property="og:type" content="website" />
          <meta property="og:url" content="https://toresaku-app.github.io/web/" />
          <meta property="og:locale" content="ja_JP" />
          <meta property="og:site_name" content="トレさく" />
          <meta name="twitter:card" content="summary_large_image" />
          <meta name="twitter:title" content="トレさく | 自主トレ指導書をサクッと作成" />
          <meta name="twitter:description" content="理学療法士のための自主トレ指導書作成アプリ。完全無料・アカウント不要。" />
          <meta name="google-site-verification" content="4gQNvVamoDVNHmUhyOA6QAUV3nOLNxJ7kVi7qDHXe98" />
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"トレさく","description":"理学療法士のための自主トレ指導書作成アプリ。運動を選んで回数・セットを設定、イラスト付きA4指導書をPDF出力。","url":"https://toresaku-app.github.io/web/","applicationCategory":"HealthApplication","operatingSystem":"Web, iOS","offers":{"@type":"Offer","price":"0","priceCurrency":"JPY"},"inLanguage":"ja","isAccessibleForFree":true}</script>
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"トレさくとは？","acceptedAnswer":{"@type":"Answer","text":"理学療法士が自主トレーニング指導書を簡単に作成できる無料アプリです。運動を選んで回数・セットを設定するだけで、イラスト付きA4指導書をPDF出力できます。"}},{"@type":"Question","name":"利用料金はかかりますか？","acceptedAnswer":{"@type":"Answer","text":"完全無料です。アカウント登録も不要で、すぐにお使いいただけます。"}},{"@type":"Question","name":"患者データはどうなりますか？","acceptedAnswer":{"@type":"Answer","text":"データは全てお使いの端末内にのみ保存されます。クラウドへの送信は一切行いません。"}},{"@type":"Question","name":"どのような運動が収録されていますか？","acceptedAnswer":{"@type":"Answer","text":"下肢・体幹・上肢の筋トレを中心に22種類以上の運動を収録。パテラセッティング、SLR、ブリッジ、スクワット、プランクなど臨床で頻用される運動が揃っています。"}},{"@type":"Question","name":"オフラインで使えますか？","acceptedAnswer":{"@type":"Answer","text":"はい。インターネット接続がなくても全機能をお使いいただけます。"}},{"@type":"Question","name":"どの端末で使えますか？","acceptedAnswer":{"@type":"Answer","text":"iPhone（iOS）アプリとしてApp Storeで配信予定。Web版はPC・スマホのブラウザからもご利用いただけます。"}}]}</script>
          """
          html = html.replace("</head>", seo_tags + "</head>")
          with open("dist/index.html", "w") as f:
              f.write(html)
          PYEOF

      # robots.txt with AI crawler settings
      - name: Create robots.txt
        run: |
          cat > dist/robots.txt << 'ROBOTS'
          User-agent: *
          Allow: /
          Sitemap: https://toresaku-app.github.io/web/sitemap.xml

          User-agent: GPTBot
          Allow: /

          User-agent: ClaudeBot
          Allow: /

          User-agent: PerplexityBot
          Allow: /

          User-agent: Google-Extended
          Allow: /
          ROBOTS

      # sitemap.xml
      - name: Create sitemap.xml
        run: |
          cat > dist/sitemap.xml << 'SITEMAP'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://toresaku-app.github.io/web/</loc>
              <lastmod>2026-04-21</lastmod>
              <changefreq>monthly</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          SITEMAP

      # llms.txt for AI crawlers
      - name: Create llms.txt
        run: |
          cat > dist/llms.txt << 'LLMS'
          # トレさく - 自主トレ指導書作成アプリ

          > 理学療法士が患者向けの自主トレーニング指導書（HEP）を簡単に作成・PDF出力できる無料Webアプリ。

          ## 主な機能
          - 22種類以上の運動メニュー（下肢・体幹・上肢）
          - イラスト付きA4指導書をPDF出力
          - 回数・セット・保持時間・頻度のカスタマイズ
          - 完全無料・アカウント不要・オフライン対応

          ## URL
          - Web版: https://toresaku-app.github.io/web/
          - プライバシーポリシー: https://toresaku-app.github.io/privacy-policy/
          LLMS

      # Landing page for SEO (static HTML visible to crawlers)
      - name: Create landing page
        run: |
          cat > dist/lp.html << 'LPEOF'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="utf-8"/>
          <meta name="viewport" content="width=device-width, initial-scale=1"/>
          <title>トレさく | 自主トレ指導書をサクッと作成 - 理学療法士向け無料アプリ</title>
          <meta name="description" content="理学療法士のための自主トレ指導書作成アプリ。22種類以上の運動メニューから選んで、回数・セットを設定、イラスト付きA4指導書をPDF出力。完全無料・アカウント不要・オフライン対応。"/>
          <meta name="keywords" content="自主トレ指導書,理学療法,リハビリ,PDF,運動指導,ホームエクササイズ,HEP,トレさく,自主トレ指導書作成,リハビリ運動イラスト,患者教育ツール,膝OA,腰痛,脳卒中"/>
          <link rel="canonical" href="https://toresaku-app.github.io/web/lp.html"/>
          <meta property="og:title" content="トレさく | 自主トレ指導書をサクッと作成"/>
          <meta property="og:description" content="理学療法士のための自主トレ指導書作成アプリ。完全無料・アカウント不要。"/>
          <meta property="og:type" content="website"/>
          <meta property="og:url" content="https://toresaku-app.github.io/web/lp.html"/>
          <meta property="og:locale" content="ja_JP"/>
          <meta property="og:site_name" content="トレさく"/>
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"トレさく","description":"理学療法士のための自主トレ指導書作成アプリ","url":"https://toresaku-app.github.io/web/","applicationCategory":"HealthApplication","operatingSystem":"Web, iOS","offers":{"@type":"Offer","price":"0","priceCurrency":"JPY"},"inLanguage":"ja","isAccessibleForFree":true}</script>
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"トレさくとは？","acceptedAnswer":{"@type":"Answer","text":"理学療法士が自主トレーニング指導書を簡単に作成できる無料アプリです。運動を選んで回数・セットを設定するだけで、イラスト付きA4指導書をPDF出力できます。"}},{"@type":"Question","name":"利用料金はかかりますか？","acceptedAnswer":{"@type":"Answer","text":"完全無料です。アカウント登録も不要で、すぐにお使いいただけます。"}},{"@type":"Question","name":"患者データはどうなりますか？","acceptedAnswer":{"@type":"Answer","text":"データは全てお使いの端末内にのみ保存されます。クラウドへの送信は一切行いません。"}},{"@type":"Question","name":"どのような運動が収録されていますか？","acceptedAnswer":{"@type":"Answer","text":"下肢・体幹・上肢の筋トレを中心に22種類以上の運動を収録。パテラセッティング、SLR、ブリッジ、スクワット、プランクなど臨床で頻用される運動が揃っています。"}},{"@type":"Question","name":"オフラインで使えますか？","acceptedAnswer":{"@type":"Answer","text":"はい。インターネット接続がなくても全機能をお使いいただけます。"}},{"@type":"Question","name":"どの端末で使えますか？","acceptedAnswer":{"@type":"Answer","text":"iPhone（iOS）アプリとしてApp Storeで配信中。Web版はPC・スマホのブラウザからもご利用いただけます。"}}]}</script>
          <style>
          *{box-sizing:border-box;margin:0;padding:0}
          body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;color:#0F172A;line-height:1.7}
          .hero{background:#0B2545;color:#fff;padding:60px 20px;text-align:center}
          .hero h1{font-size:28px;margin-bottom:8px}
          .hero p{font-size:16px;color:#94A3B8;margin-bottom:24px}
          .hero .cta{display:inline-block;background:#0EA5E9;color:#fff;padding:14px 32px;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px}
          .section{max-width:800px;margin:0 auto;padding:48px 20px}
          .section h2{font-size:22px;font-weight:700;color:#0B2545;margin-bottom:20px;border-left:4px solid #0B2545;padding-left:12px}
          .steps{display:flex;flex-direction:column;gap:20px}
          .step{display:flex;gap:16px;align-items:flex-start}
          .step-num{width:36px;height:36px;border-radius:50%;background:#0B2545;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
          .step-body h3{font-size:16px;font-weight:700;margin-bottom:4px}
          .step-body p{font-size:14px;color:#475569}
          .features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
          .feature{background:#F7F9FC;border:1px solid #E6EAF0;border-radius:12px;padding:20px;text-align:center}
          .feature .icon{font-size:32px;margin-bottom:8px}
          .feature h3{font-size:15px;font-weight:700;margin-bottom:4px}
          .feature p{font-size:13px;color:#475569}
          .faq{display:flex;flex-direction:column;gap:16px}
          .faq-item{border:1px solid #E6EAF0;border-radius:10px;padding:16px 20px}
          .faq-item h3{font-size:15px;font-weight:700;color:#0B2545;margin-bottom:6px}
          .faq-item p{font-size:14px;color:#475569}
          .footer{background:#F1F5F9;padding:32px 20px;text-align:center;font-size:12px;color:#94A3B8}
          .footer a{color:#0B2545;text-decoration:none}
          .disclaimer{max-width:800px;margin:0 auto;padding:24px 20px;font-size:12px;color:#94A3B8;border-top:1px solid #E6EAF0}
          </style>
          </head>
          <body>
          <div class="hero">
            <h1>トレさく</h1>
            <p>自主トレ指導書を、サクッと作成</p>
            <p style="font-size:14px;color:#CBD5E1;margin-bottom:24px">理学療法士のための指導書作成アプリ — 完全無料</p>
            <a href="/web/" class="cta">今すぐ使ってみる</a>
          </div>

          <div class="section">
            <h2>たった3ステップで完成</h2>
            <div class="steps">
              <div class="step">
                <div class="step-num">1</div>
                <div class="step-body">
                  <h3>運動を選ぶ</h3>
                  <p>22種類以上の運動メニューから、部位・姿勢でフィルタして必要な運動を選択。パテラセッティング、SLR、ブリッジ、スクワットなど臨床で頻用される運動を収録。</p>
                </div>
              </div>
              <div class="step">
                <div class="step-num">2</div>
                <div class="step-body">
                  <h3>回数・セットを調整</h3>
                  <p>回数、セット数、保持時間、実施頻度を患者さんに合わせてカスタマイズ。注意事項も自由に入力できます。</p>
                </div>
              </div>
              <div class="step">
                <div class="step-num">3</div>
                <div class="step-body">
                  <h3>PDFを出力・共有</h3>
                  <p>イラスト付きA4指導書をPDF出力。印刷してそのまま患者さんに渡せます。LINE・メールでの共有も可能。</p>
                </div>
              </div>
            </div>
          </div>

          <div class="section">
            <h2>特徴</h2>
            <div class="features">
              <div class="feature">
                <div class="icon">💰</div>
                <h3>完全無料</h3>
                <p>全機能が無料。広告も表示されません。</p>
              </div>
              <div class="feature">
                <div class="icon">👤</div>
                <h3>アカウント不要</h3>
                <p>登録なしですぐに使い始められます。</p>
              </div>
              <div class="feature">
                <div class="icon">📴</div>
                <h3>オフライン対応</h3>
                <p>インターネット接続なしで全機能が使えます。</p>
              </div>
              <div class="feature">
                <div class="icon">🔒</div>
                <h3>プライバシー保護</h3>
                <p>データは端末内のみ。クラウド送信は一切なし。</p>
              </div>
              <div class="feature">
                <div class="icon">🏥</div>
                <h3>22種類以上の運動</h3>
                <p>下肢・体幹・上肢の筋トレを中心に、臨床で使える運動を収録。</p>
              </div>
              <div class="feature">
                <div class="icon">🖼️</div>
                <h3>イラスト付き</h3>
                <p>全運動にわかりやすいイラスト付き。患者さんに渡しやすい指導書に。</p>
              </div>
            </div>
          </div>

          <div class="section">
            <h2>こんな場面で使えます</h2>
            <div class="faq" style="gap:12px">
              <div class="faq-item">
                <h3>🦵 整形外科リハビリ</h3>
                <p>膝OA術後、大腿骨骨折後の自主トレ指導書作成に。パテラセッティング、SLR、スクワットなど定番メニューを収録。</p>
              </div>
              <div class="faq-item">
                <h3>🧠 脳卒中リハビリ</h3>
                <p>回復期・維持期の自主トレプログラム作成に。上肢・下肢・バランス訓練を組み合わせた指導書を簡単作成。</p>
              </div>
              <div class="faq-item">
                <h3>🏠 訪問リハビリ</h3>
                <p>訪問先で患者さんに渡す自主トレメニューを事前に準備。オフラインでも使えるので通信環境を気にせず利用可能。</p>
              </div>
              <div class="faq-item">
                <h3>👴 介護予防</h3>
                <p>高齢者向けの転倒予防・筋力維持プログラムの指導書作成に。イラスト付きで分かりやすい。</p>
              </div>
            </div>
          </div>

          <div class="section">
            <h2>よくある質問</h2>
            <div class="faq">
              <div class="faq-item">
                <h3>Q. トレさくとは？</h3>
                <p>理学療法士が自主トレーニング指導書を簡単に作成できる無料アプリです。運動を選んで回数・セットを設定するだけで、イラスト付きA4指導書をPDF出力できます。</p>
              </div>
              <div class="faq-item">
                <h3>Q. 利用料金はかかりますか？</h3>
                <p>完全無料です。アカウント登録も不要で、すぐにお使いいただけます。</p>
              </div>
              <div class="faq-item">
                <h3>Q. 患者データはどうなりますか？</h3>
                <p>データは全てお使いの端末内にのみ保存されます。クラウドへの送信は一切行いません。</p>
              </div>
              <div class="faq-item">
                <h3>Q. どのような運動が収録されていますか？</h3>
                <p>下肢・体幹・上肢の筋トレを中心に22種類以上の運動を収録。パテラセッティング、SLR、ブリッジ、スクワット、プランクなど臨床で頻用される運動が揃っています。</p>
              </div>
              <div class="faq-item">
                <h3>Q. オフラインで使えますか？</h3>
                <p>はい。インターネット接続がなくても全機能をお使いいただけます。</p>
              </div>
              <div class="faq-item">
                <h3>Q. どの端末で使えますか？</h3>
                <p>iPhone（iOS）アプリとしてApp Storeで配信予定。Web版はPC・スマホのブラウザからもご利用いただけます。</p>
              </div>
            </div>
          </div>

          <div class="section" style="padding-top:24px;padding-bottom:24px">
            <div style="background:#EEF2F9;border-radius:12px;padding:20px;display:flex;gap:16px;align-items:center">
              <div style="font-size:40px;flex-shrink:0">👨‍⚕️</div>
              <div>
                <p style="font-size:14px;font-weight:700;color:#0B2545;margin-bottom:4px">現役理学療法士が監修</p>
                <p style="font-size:13px;color:#475569">収録されている運動メニュー・指導内容は、臨床経験を持つ現役の理学療法士が監修しています。エビデンスに基づいた運動を厳選し、安全にご利用いただけるよう配慮しています。</p>
              </div>
            </div>
          </div>

          <div class="disclaimer">
            <p>※本アプリは運動指導書の作成・出力ツールであり、疾病の診断・治療・予防を目的とするものではありません。運動内容の判断は医療専門職が行ってください。</p>
          </div>

          <div class="footer">
            <p><a href="/web/">アプリを使う</a> ・ <a href="https://toresaku-app.github.io/privacy-policy/">プライバシーポリシー</a> ・ <a href="https://toresaku-app.github.io/privacy-policy/terms.html">利用規約</a></p>
            <p style="margin-top:8px">© 2026 トレさく</p>
          </div>
          </body>
          </html>
          LPEOF

      # Add LP to sitemap
      - name: Update sitemap with LP
        run: |
          cat > dist/sitemap.xml << 'SITEMAP'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://toresaku-app.github.io/web/</loc>
              <lastmod>2026-04-21</lastmod>
              <changefreq>monthly</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://toresaku-app.github.io/web/lp.html</loc>
              <lastmod>2026-04-21</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.9</priority>
            </url>
          </urlset>
          SITEMAP

      # SPA fallback: copy index.html to 404.html
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
