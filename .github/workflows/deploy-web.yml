name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx expo export --platform web

      # Fix asset paths for GitHub Pages subdirectory (/web/)
      - name: Rewrite asset paths for /web/ subdirectory
        run: |
          sed -i 's|href="/_expo/|href="/web/_expo/|g' dist/index.html
          sed -i 's|src="/_expo/|src="/web/_expo/|g' dist/index.html
          sed -i 's|href="/favicon.ico|href="/web/favicon.ico|g' dist/index.html

      # SPA fallback: copy index.html to 404.html
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
