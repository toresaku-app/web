name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx expo export --platform web

      # Copy PWA assets
      - name: Copy PWA manifest and icons
        run: |
          cp public/manifest.json dist/manifest.json
          mkdir -p dist/assets
          cp assets/icon-192.png dist/assets/icon-192.png
          cp assets/icon-512.png dist/assets/icon-512.png
          cp assets/og-image.png dist/assets/og-image.png
          mkdir -p dist/assets/lp
          cp assets/lp/*.webp dist/assets/lp/

      # SEO meta tags + OGP + structured data
      - name: Inject SEO meta tags and structured data
        run: |
          python3 << 'PYEOF'
          with open("dist/index.html", "r") as f:
              html = f.read()
          seo_tags = """<link rel="manifest" href="/web/manifest.json" />
          <meta name="theme-color" content="#0B2545" />
          <meta name="description" content="理学療法士のための自主トレ指導書作成アプリ。運動を選んで回数・セットを設定、イラスト付きA4指導書をPDF出力。完全無料・アカウント不要・オフライン対応。" />
          <meta name="keywords" content="自主トレ,指導書,理学療法,リハビリ,PDF,運動指導,ホームエクササイズ,HEP,トレさく,自主トレ指導書作成,リハビリ運動イラスト,患者教育ツール" />
          <link rel="canonical" href="https://toresaku-app.github.io/web/" />
          <meta property="og:title" content="トレさく | 自主トレ指導書をサクッと作成" />
          <meta property="og:description" content="理学療法士のための自主トレ指導書作成アプリ。運動を選んで回数・セットを設定、イラスト付きA4指導書をPDF出力。完全無料。" />
          <meta property="og:type" content="website" />
          <meta property="og:url" content="https://toresaku-app.github.io/web/" />
          <meta property="og:locale" content="ja_JP" />
          <meta property="og:site_name" content="トレさく" />
          <meta property="og:image" content="https://toresaku-app.github.io/web/assets/og-image.png" />
          <meta property="og:image:width" content="1200" />
          <meta property="og:image:height" content="630" />
          <meta property="og:image:alt" content="トレさく - 自主トレ指導書をサクッと作成" />
          <meta name="twitter:card" content="summary_large_image" />
          <meta name="twitter:title" content="トレさく | 自主トレ指導書をサクッと作成" />
          <meta name="twitter:description" content="理学療法士のための自主トレ指導書作成アプリ。完全無料・アカウント不要。" />
          <meta name="twitter:image" content="https://toresaku-app.github.io/web/assets/og-image.png" />
          <meta name="google-site-verification" content="4gQNvVamoDVNHmUhyOA6QAUV3nOLNxJ7kVi7qDHXe98" />
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"トレさく","description":"理学療法士のための自主トレ指導書作成アプリ。運動を選んで回数・セットを設定、イラスト付きA4指導書をPDF出力。","url":"https://toresaku-app.github.io/web/","applicationCategory":"HealthApplication","operatingSystem":"Web, iOS","offers":{"@type":"Offer","price":"0","priceCurrency":"JPY"},"inLanguage":"ja","isAccessibleForFree":true}</script>
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"トレさくとは？","acceptedAnswer":{"@type":"Answer","text":"理学療法士が自主トレーニング指導書を簡単に作成できる無料アプリです。運動を選んで回数・セットを設定するだけで、イラスト付きA4指導書をPDF出力できます。"}},{"@type":"Question","name":"利用料金はかかりますか？","acceptedAnswer":{"@type":"Answer","text":"完全無料です。アカウント登録も不要で、すぐにお使いいただけます。"}},{"@type":"Question","name":"患者データはどうなりますか？","acceptedAnswer":{"@type":"Answer","text":"データは全てお使いの端末内にのみ保存されます。クラウドへの送信は一切行いません。"}},{"@type":"Question","name":"どのような運動が収録されていますか？","acceptedAnswer":{"@type":"Answer","text":"下肢・体幹・上肢の筋トレを中心に100種類以上の運動を収録。パテラセッティング、SLR、ブリッジ、スクワット、プランクなど臨床で頻用される運動が揃っています。"}},{"@type":"Question","name":"オフラインで使えますか？","acceptedAnswer":{"@type":"Answer","text":"はい。インターネット接続がなくても全機能をお使いいただけます。"}},{"@type":"Question","name":"どの端末で使えますか？","acceptedAnswer":{"@type":"Answer","text":"iPhone（iOS）アプリとしてApp Storeで配信予定。Web版はPC・スマホのブラウザからもご利用いただけます。"}}]}</script>
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","name":"トレさく","url":"https://toresaku-app.github.io/web/","logo":"https://toresaku-app.github.io/web/assets/icon-512.png","description":"理学療法士のための自主トレ指導書作成アプリ","contactPoint":{"@type":"ContactPoint","contactType":"customer support","email":"toresaku.app@gmail.com"}}</script>
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"トップ","item":"https://toresaku-app.github.io/web/"}]}</script>
          """
          html = html.replace("</head>", seo_tags + "</head>")
          with open("dist/index.html", "w") as f:
              f.write(html)
          PYEOF

      # robots.txt with AI crawler settings
      - name: Create robots.txt
        run: |
          cat > dist/robots.txt << 'ROBOTS'
          User-agent: *
          Allow: /
          Sitemap: https://toresaku-app.github.io/web/sitemap.xml

          User-agent: GPTBot
          Allow: /

          User-agent: ClaudeBot
          Allow: /

          User-agent: PerplexityBot
          Allow: /

          User-agent: Google-Extended
          Allow: /
          ROBOTS

      # sitemap.xml
      - name: Create sitemap.xml
        run: |
          cat > dist/sitemap.xml << 'SITEMAP'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://toresaku-app.github.io/web/</loc>
              <lastmod>2026-04-23</lastmod>
              <changefreq>monthly</changefreq>
              <priority>1.0</priority>
            </url>
          </urlset>
          SITEMAP

      # llms.txt for AI crawlers
      - name: Create llms.txt
        run: |
          cat > dist/llms.txt << 'LLMS'
          # トレさく - 自主トレ指導書作成アプリ

          > 理学療法士が患者向けの自主トレーニング指導書（HEP）を簡単に作成・PDF出力できる無料Webアプリ。

          ## 主な機能
          - 100種類以上の運動メニュー（下肢・体幹・上肢）
          - イラスト付きA4指導書をPDF出力
          - 回数・セット・保持時間・頻度のカスタマイズ
          - 完全無料・アカウント不要・オフライン対応

          ## URL
          - Web版: https://toresaku-app.github.io/web/
          - プライバシーポリシー: https://toresaku-app.github.io/privacy-policy/
          LLMS

      # Landing page is in public/lp.html (copied by expo export)
      - name: Verify landing page
        run: test -f dist/lp.html && echo "LP OK" || cp public/lp.html dist/lp.html


      # Add LP to sitemap
      - name: Update sitemap with LP
        run: |
          cat > dist/sitemap.xml << 'SITEMAP'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://toresaku-app.github.io/web/</loc>
              <lastmod>2026-04-23</lastmod>
              <changefreq>monthly</changefreq>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://toresaku-app.github.io/web/lp.html</loc>
              <lastmod>2026-04-23</lastmod>
              <changefreq>monthly</changefreq>
              <priority>0.9</priority>
            </url>
          </urlset>
          SITEMAP

      # SPA fallback: copy index.html to 404.html
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
